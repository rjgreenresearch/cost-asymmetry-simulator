    unit_cost: 12700000
    inventory_est: 370
    annual_production: 32
    time_to_replace_years: [3, 8]
    engagement_range_km: 200
    intercept_rate_pct: 90
    quality_tier: HIGH
    dud_rate: 0.01
    consumption_rates:
      theater_1: {mean: 7,  cv: 0.40}   # Middle East / Iran
      theater_2: {mean: 3,  cv: 0.35}   # Indo-Pacific / China
