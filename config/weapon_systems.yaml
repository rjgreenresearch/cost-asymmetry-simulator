  # ── TIER 4: COUNTER-DRONE ─────────────────────────────────────────────────
  DroneHunter:
    display_name: "Drone-Hunter C-UAS Interceptor (Generic Category)"
    tier: ATTRITION_DEFENSE
    type: c_uas_interceptor_drone
    unit_cost: 2500
    unit_cost_range: [1000, 15000]
    unit_cost_note: >
      Corrected April 2026. Ukrainian combat-proven systems (STING: ~$2,500;
      General Cherry interceptors: $1,000-$2,275) are the validated reference.
      U.S. DIU-procured equivalents (Dedrone, Skydio) run $10,000-$15,000.
      Simulation uses $2,500 as the operationally validated baseline.
    inventory_est: 2000
    annual_production_target: 500000
    time_to_replace_years: 0
    engagement_range_km: 25
    intercept_rate_pct: 70
    quality_tier: MED
    dud_rate: 0.15
    consumption_rates:
      theater_1: {mean: 100, cv: 0.65}
      theater_2: {mean: 200, cv: 0.65}
    theater_correlation: 0.20
    notes: >
      Drone-vs-drone intercept via high-speed FPV collision or net/kinetic payload.
      Proven at operational scale in Ukraine. STING (Wild Hornets): ~$2,500,
      360-deg antenna, EW-resistant, 25km range, 1,000+ Shahed kills in 4 months.
      General Cherry interceptors: $1,000-$2,275, ~1,000/day production rate.
      P1-Sun and Merops AS-3: air-launched variants used by U.S. forces in Middle East.
      At $2,500 vs $20,000 Shahed: CAR = 8.0 (strong US advantage).
      At $2,500 vs $500 FPV: CAR = 0.20 (adversary advantage, but viable at scale).
    sources:
      - "Wild Hornets / STING programme documentation"
      - "General Cherry production data — Ukrainian MoD"
      - "P1-Sun / Merops AS-3: DIU briefings 2025-2026"
      - "Sandboxx News: Ukrainian drone-hunter systems (2025-2026)"
      - "CORRECTION: Previous $15,000 figure sourced from U.S. DIU procurement"
      - "estimates for Dedrone/Skydio platforms, not Ukrainian combat systems."

