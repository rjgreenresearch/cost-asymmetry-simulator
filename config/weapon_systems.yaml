  # ── TIER 6: INFANTRY / PERSONAL DRONE DEFENSE ────────────────────────────
  Skynet_12GA_AntiDrone:
    display_name: "ALS/Maverick SKYNET 12-Gauge Anti-Drone Shell"
    tier: INFANTRY_CUAS
    type: personal_drone_defense_shotgun
    unit_cost: 47
    unit_cost_range: [46, 48]
    inventory_est: 500000
    annual_production_target: 10000000
    time_to_replace_years: 0
    engagement_range_km: 0.05
    intercept_rate_pct: 60
    quality_tier: MED
    dud_rate: 0.10
    consumption_rates:
      theater_1: {mean: 50000, cv: 0.70}
      theater_2: {mean: 100000, cv: 0.70}
    theater_correlation: 0.20
    notes: >
      12-gauge shell deploying 5 tethered projectiles forming a 5-foot net.
      Entangles drone propellers on contact. Compatible with any standard
      12-gauge shotgun (Benelli M4 A.I. Drone Guardian is purpose-built platform).
      U.S. Air Force already procuring. Two variants: single net (5ft) and
      double net (14in + 24in). Last line of defense for ground troops and
      sailors against FPV quadcopters. $47 vs $3.7M PAC-3 = 78,723:1 cost ratio
      for terminal drone engagement. MIL-SPEC rifled choke barrel required.
    sources:
      - "ALS/Maverick Tactical product data; Botach/Primary Arms retail pricing 2026"
      - "SHOT Show 2026 coverage — Sandboxx News (February 6, 2026)"
      - "Pew Pew Tactical: Shotguns and Drones (August 2025)"
      - "U.S. Air Force SKYNET procurement — public statements 2025"

  DroneRound_556_NATO:
    display_name: "Drone Round Defense 5.56 NATO Anti-Drone Cartridge"
    tier: INFANTRY_CUAS
    type: personal_drone_defense_rifle
    unit_cost: 8
    unit_cost_range: [6, 12]
    inventory_est: 1000000
    annual_production_target: 350000000
    time_to_replace_years: 0
    engagement_range_km: 0.1
    intercept_rate_pct: 45
    quality_tier: MED
    dud_rate: 0.12
    consumption_rates:
      theater_1: {mean: 200000, cv: 0.80}
      theater_2: {mean: 400000, cv: 0.80}
    theater_correlation: 0.20
    notes: >
      Multi-projectile 5.56 NATO round splitting into 8 fragments (K variant,
      50m effective range) or 5 fragments (L variant, 100m range). Belt-fed and
      suppressor-compatible. No weapon modifications required — load alongside
      standard ball in same magazines. Exits at 2,200 fps (~2x standard 12-gauge).
      Patent-pending design. Military/LE only as of Jan 2026. Parent company
      (Freedom Munitions/Unlimited Ammo) has 350M round/yr production capacity.
      Unit cost estimated $6–12 at volume; currently higher in initial lots.
      CRITICAL ADVANTAGE: infantry already carrying M4/M16 can engage drones
      without a separate weapon system. Removes logistics burden of separate
      anti-drone shotgun per squad.
    sources:
      - "SHOT Show 2026 — The Firearm Blog (January 30, 2026)"
      - "Drone Round Defense SHOT 2026 booth data"
      - "Sandboxx News: New frontiers in anti-drone munitions (February 2026)"

